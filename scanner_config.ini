# Scanner Configuration
# Customize subdomain and endpoint patterns

[subdomains]
# Add your custom subdomains here (one per line)
www
mail
api
admin
dev
staging
beta
test
portal
dashboard
app
cdn
static
vpn
git

[endpoints]
# Add your custom endpoint patterns here (one per line)
/api
/api/v1
/api/v2
/admin
/login
/dashboard
/graphql
/swagger
/.env
/.git/config
/config.json
/backup
/uploads
/files

[scan_options]
# Scanning behavior
follow_redirects = true
check_subdomains = true
crawl_pages = true
test_common_files = true

# Performance
max_concurrent = 10
timeout = 10
retry_count = 2

[filters]
# Response codes to consider valid
valid_status_codes = 200,201,202,301,302,401,403

# Exclude patterns (regex)
exclude_extensions = .jpg,.png,.gif,.css,.js,.woff,.ttf
exclude_patterns = /logout,/signout
